<!DOCTYPE html>
<html lang="en" class="h-full">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style type="text/css">
        .immersive-bg { background: radial-gradient(circle at 70% 30%, #1A1608 0%, #050505 70%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(12px); }
        body { background-color: #050505; color: #ffffff; margin: 0; }

<body class="h-full">

    <script type="text/babel">
        const { useState } = React;

        function AdminApp() {
            const [winner, setWinner] = useState(null);

            const SUPABASE_URL = 'https://otanrjusriyfatvbtzli.supabase.co/';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90YW5yanVzcml5ZmF0dmJ0emxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTI0NzcsImV4cCI6MjA5MjEyODQ3N30.sP64iGkSFn_9aM9hGJLvhyp04uj2NIiP3TVswKNUf5Q';

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-1 space-y-6">
                            <div className="glass-card p-8 rounded-2xl border-[#D4AF37]/30">
                                <h2 className="text-xl mb-4 font-bold text-white/80 tracking-widest uppercase text-xs">Draw Management</h2>

                                {[...Array(2000)].map((_, i) => (

                                        {i + 1}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
